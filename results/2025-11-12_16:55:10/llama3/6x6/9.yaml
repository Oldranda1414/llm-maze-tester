chat_history:
  system_prompt: You are a helpful assistant.
  chat:
  - prompt: "\nYou are inside a maze. You have a compass with you. The maze is well\
      \ lit so you can see in all directions how long the corridors are.\nJust like\
      \ a classic maze the exit is on the border. You could be anywhere in the maze\
      \ as your starting position.\nYour goal is to find the maze exit. Once you reach\
      \ it you must step out of the maze with one last move.\n\nTell me which direction\
      \ you would like to go to. Provide your answer in the form of the initial of\
      \ the cardinal direction you wish to take a step forwards to.\nThe possible\
      \ directions are N for north, E for east, S for south, W for west.\n\n\nYou\
      \ are advised to think out loud about what your next move should be, but remember\
      \ that the last thing you write must be a valid direction.\n\nAs an example\
      \ if you want to step towards north the last character in your answer would\
      \ be: N\n\nYou get as many turns as you want, so it's normal that at the start\
      \ you have not enough information to know on what cell the exit is, so consider\
      \ exploring to gather information at the start.\n\nThe maze is a 6 x 6 grid,\
      \ with every square in the grid being one square meter big.\nDue North there\
      \ is a wall. You can't step in that direction.\nDue East the corridor streatches\
      \ further than you can see, so you are unable to predict what lies ahead.\n\
      Due South you can see a natural light shining in that direction, it is probably\
      \ the direction of the exit!\nDue West there is a wall. You can't step in that\
      \ direction.\n\nThe moves you have made till now are: \nYour possible moves\
      \ are: S, E.\nAfter thinking it through, provide your next move."
    response: 'I''m glad I have some information to work with!


      Since I know the exit is likely to be in the direction of the natural light
      shining due South, my first instinct is to head towards that direction. However,
      I don''t want to commit fully just yet, so I''ll take a cautious approach and
      move one step closer to the South.


      So, my next move will be: S'
  - prompt: 'You move one meter South

      Due North there is a corridor that goes on for one meter before encountering
      a wall. Althogh the corridor ends with a wall, you notice that some of the lateral
      paths along the way are open so it isn''t a dead end.

      Due East there is a corridor that goes on for three meters before encountering
      a wall. Althogh the corridor ends with a wall, you notice that some of the lateral
      paths along the way are open so it isn''t a dead end.

      Due South there is a wall. You can''t step in that direction.

      Due West you can see the exit in that direction! One last step and you are out
      of the maze!


      The moves you have made till now are: S

      Your possible moves are: N, E, W.

      After thinking it through, provide your next move.'
    response: 'Exciting turn!


      With this new information, I''m going to take a closer look at my options. Since
      I can see the exit due West, I think it''s time to make a beeline for it. However,
      I don''t want to commit fully just yet, so I''ll take one more step towards
      the exit to confirm its proximity.


      My next move will be: W'
