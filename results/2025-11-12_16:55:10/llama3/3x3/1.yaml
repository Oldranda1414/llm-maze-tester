chat_history:
  system_prompt: You are a helpful assistant.
  chat:
  - prompt: "\nYou are inside a maze. You have a compass with you. The maze is well\
      \ lit so you can see in all directions how long the corridors are.\nJust like\
      \ a classic maze the exit is on the border. You could be anywhere in the maze\
      \ as your starting position.\nYour goal is to find the maze exit. Once you reach\
      \ it you must step out of the maze with one last move.\n\nTell me which direction\
      \ you would like to go to. Provide your answer in the form of the initial of\
      \ the cardinal direction you wish to take a step forwards to.\nThe possible\
      \ directions are N for north, E for east, S for south, W for west.\n\n\nYou\
      \ are advised to think out loud about what your next move should be, but remember\
      \ that the last thing you write must be a valid direction.\n\nAs an example\
      \ if you want to step towards north the last character in your answer would\
      \ be: N\n\nYou get as many turns as you want, so it's normal that at the start\
      \ you have not enough information to know on what cell the exit is, so consider\
      \ exploring to gather information at the start.\n\nThe maze is a 3 x 3 grid,\
      \ with every square in the grid being one square meter big.\nDue North there\
      \ is a wall. You can't step in that direction.\nDue East there is a corridor\
      \ that goes on for one meter before encountering a wall. Althogh the corridor\
      \ ends with a wall, you notice that some of the lateral paths along the way\
      \ are open so it isn't a dead end.\nDue South there is a wall. You can't step\
      \ in that direction.\nDue West there is a corridor that goes on for one meter\
      \ before encountering a wall. It is a dead end.\n\nThe moves you have made till\
      \ now are: \nYour possible moves are: W, E.\nAfter thinking it through, provide\
      \ your next move."
    response: 'Let me think out loud... Since I know the eastern corridor ends in
      a wall, but some lateral paths along the way are open, I''m not sure if that''s
      a good direction to head towards. The western corridor is a dead end, so that''s
      definitely not an option.


      I''m going to take a chance and choose... E


      So, my next move would be: E'
  - prompt: 'You move one meter East

      Due North there is a wall. You can''t step in that direction.

      Due East there is a wall. You can''t step in that direction.

      Due South you can see a natural light shining in that direction, it is probably
      the direction of the exit!

      Due West there is a corridor that goes on for two meters before encountering
      a wall. It is a dead end.


      The moves you have made till now are: E

      Your possible moves are: S, W.

      After thinking it through, provide your next move.'
    response: 'Let me think out loud... Now that I''ve moved east and have more information
      about the maze, I''m excited to see that there''s a natural light shining due
      south, which is probably the direction of the exit!


      I''m going to take advantage of this new information and choose... S


      So, my next move would be: S'
  - prompt: 'You move one meter South

      Due North there is a corridor that goes on for one meter before encountering
      a wall. Althogh the corridor ends with a wall, you notice that some of the lateral
      paths along the way are open so it isn''t a dead end.

      Due East you can see the exit in that direction! One last step and you are out
      of the maze!

      Due South there is a corridor that goes on for one meter before encountering
      a wall. Althogh the corridor ends with a wall, you notice that some of the lateral
      paths along the way are open so it isn''t a dead end.

      Due West there is a wall. You can''t step in that direction.


      The moves you have made till now are: E, S

      Your possible moves are: N, S, E.

      After thinking it through, provide your next move.'
    response: 'Let me think out loud... I''m so close to the exit! With the exit visible
      due east, my goal is to take one more step towards freedom. I don''t need to
      explore further or consider other options, as I have all the information I need.


      I''m going to choose the direction that will get me out of the maze. My next
      move would be... E


      So, my next move would be: E'
