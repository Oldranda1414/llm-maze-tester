      \ (with Degree-Based Ordering)\n\n1. **Problem**: Given a graph represented\
      \ as an adjacency list, find the minimum number of colors needed to color the\
      \ vertices so that no two adjacent vertices share the same color.\n\n2.  **Algorithm**:\n\
      \    - **Step 1**: Compute the degree of each vertex.\n    - **Step 2**: Sort\
      \ the vertices in descending order of their degrees.\n    - **Step 3**: Initialize\
      \ a dictionary to keep track of the colors assigned to each vertex.\n    - **Step\
      \  4**: For each vertex in the sorted order:\n        - Collect the colors of\
      \ its neighbors (if any neighbor has been colored).\n        - Assign the smallest\
      \ available color not used by any neighbor.\n    - **Step 5**: The number of\
