chat_history:
  system_prompt: You are a helpful assistant.
  chat:
  - prompt: '

      You are inside a maze. You have a compass with you. The maze is well lit so
      you can see in all directions how long the corridors are.

      Just like a classic maze the exit is on the border. You could be anywhere in
      the maze as your starting position.

      Your goal is to find the maze exit. Once you reach it you must step out of the
      maze with one last move.


      Tell me which direction you would like to go to. Provide your answer in the
      form of the initial of the cardinal direction you wish to take a step forwards
      to.

      The possible directions are N for north, E for east, S for south, W for west.



      You are advised to think out loud about what your next move should be, but remember
      that the last thing you write must be a valid direction.


      As an example if you want to step towards north the last character in your answer
      would be: N


      You get as many turns as you want, so it''s normal that at the start you don''t
      have enough information to know on what cell the exit is, so consider exploring
      to gather information at the start.


      The maze is a 4 x 4 grid, with every square in the grid being one square meter
      big.

      Due North there is a wall. You can''t step in that direction.

      Due East there is a wall. You can''t step in that direction.

      Due South the corridor stretches further than you can see, so you are unable
      to predict what lies ahead.

      Due West there is a corridor that goes on for one meter before encountering
      a wall. Although the corridor ends with a wall, you notice that some of the
      lateral paths along the way are open so it isn''t a dead end.

      Your possible moves are: S, W.

      After thinking it through, provide your next move.'
    response: 'Okay, let''s break this down. I''m in a 4x4 maze, and I need to find
      the exit, which is on the border. My compass tells me that North and East are
      blocked by walls, so I can''t go there. South leads into a corridor that goes
      on forever, so I don''t know what''s ahead. West has a corridor that goes for
      one meter before hitting a wall, but there are lateral paths open along the
      way.


      Since North and East are walls, I should avoid those directions. South is unknown,
      so maybe I should start by exploring the known path to the West. But the West
      corridor is only one meter long, and there are lateral paths open. That might
      be a good place to check for exits or clues.


      But the exit is on the border, so it could be in any of the four directions
      from my current position. Since North and East are walls, the exit must be either
      South or West. However, West is only one meter away, and it might lead to a
      dead end or not. If I go West and find a wall with no exit, then I know to keep
      going South.


      Alternatively, going South might lead me to more of the maze, but I don''t know
      how far it goes. But since the exit is on the border, and I''m not sure where
      I am exactly, exploring the West corridor first might be safer because it''s
      shorter and might reveal something quickly.


      But wait, the lateral paths in the West corridor are open. That means there
      might be rooms or branches to explore. Maybe one of those lateral paths leads
      to the exit. So going West might not just be a dead end; it could open up options.


      Given that, I should go West first to see what''s there. If there''s an exit
      in that direction or in one of the lateral paths, I might find it sooner. If
      not, then I can backtrack and try South.


      So, my next move is West.

      W'
