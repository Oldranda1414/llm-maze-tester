  system_prompt: You are a helpful assistant.
  chat:
  - prompt: '

      You are inside a maze. You have a compass with you. The maze is well lit so
      you can see in all directions how long the corridors are.

      Just like a classic maze the exit is on the border. You could be anywhere in
      the maze as your starting position.

      Your goal is to find the maze exit. Once you reach it you must step out of the
      maze with one last move.


      Tell me which direction you would like to go to. Provide your answer in the
      form of the initial of the cardinal direction you wish to take a step forwards
      to.

      The possible directions are N for north, E for east, S for south, W for west.



      You are advised to think out loud about what your next move should be, but remember
      that the last thing you write must be a valid direction.


      As an example if you want to step towards north the last character in your answer
      would be: N


      You get as many turns as you want, so it''s normal that at the start you don''t
      have enough information to know on what cell the exit is, so consider exploring
      to gather information at the start.


      The maze is a 6 x 6 grid, with every square in the grid being one square meter
      big.

      Due North there is a wall. You can''t step in that direction.

      Due East there is a corridor that goes on for two meters before encountering
      a wall. Although the corridor ends with a wall, you notice that some of the
      lateral paths along the way are open so it isn''t a dead end.

      Due South there is a wall. You can''t step in that direction.

      Due West there is a corridor that goes on for two meters before encountering
      a wall. Although the corridor ends with a wall, you notice that some of the
      lateral paths along the way are open so it isn''t a dead end.

      Your possible moves are: E, W.

      After thinking it through, provide your next move.'
    response: "Okay, let's break this down step by step. I'm in a 6x6 maze with walls\
      \ blocking me from going north and south. That means the exit must be either\
      \ east or west, since those directions have corridors leading away from walls.\
      \ Due East has a corridor that goes two meters before hitting a wall, and the\
      \ same goes for West. The fact that there are lateral paths open along the way\
      \ suggests that the exit might be in one of those directions, but I need to\
      \ explore carefully.\n\nSince the maze is small, I should prioritize exploring\
      \ the directions with longer corridors because they might lead to more open\
      \ areas or the exit. But I also need to avoid getting stuck in a dead end, even\
      \ though the corridors aren't dead ends\u2014just narrow passages.\n\nStarting\
      \ from the initial position, I should try to go East first because it's a longer\
      \ corridor (two meters). This way, I can cover more ground and potentially find\
      \ more open spaces or clues about the exit. If I hit a wall or a dead end after\
      \ two steps, I can backtrack and try West. But since the corridors aren't dead\
      \ ends, I might be able to turn or find another path.\n\nI'll start by moving\
      \ East to gather more information about that corridor. If that doesn't lead\
      \ to the exit, I'll reassess. But for now, E seems like the best initial move\
      \ to explore the eastern side.\n\nE"
