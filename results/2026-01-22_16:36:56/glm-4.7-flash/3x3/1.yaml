      \ to a wall, blocking direct North progress.\n2.  **East (2,1):** Solid wall.\
      \ Blocked.\n3.  **South (1,0):** Solid wall. Blocked.\n4.  **West (0,1):** Solid\
      \ wall. Blocked.\n\nThe immediate corridor leads only to a dead end (East).\
