      \ in that direction.\nDue South there is a corridor that goes on for one meter\
      \ before encountering a wall. You are able to see that the corridor has some\
      \ lateral paths:\n   - After one meter there is a lateral path due West.\nDue\
      \ West there is a wall. You can't step in that direction."
    response: "Map:\n```\n   .\n   .\n   .\n```\nCurrent Position: [0,0]\n\nI am standing\
      \ at the center [0,0]. The description of North indicates a corridor with lateral\
      \ paths at the end, which is consistent with the map boundaries (the exit is\
      \ on the border). South and East are walls, which confirms the edges of the\
      \ 3x3 grid. West is a wall, but the maze must be solvable, so there must be\
      \ a passage I haven't found yet. The lateral paths mentioned in the North description\
      \ suggest the exit is North. I will move North.\n\nNorth"
