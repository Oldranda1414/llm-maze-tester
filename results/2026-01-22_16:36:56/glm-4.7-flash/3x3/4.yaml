      -   The South corridor (at 2,2) connects to my current location (1,1).

      -   The North corridor (at 0,1) connects to my current location (1,1).

      -   The South corridor connects to the wall at (2,0).

      -   The North corridor connects to the wall at (0,0).

      -   Both corridors connect at my current position.

      -   The exit is on the border. The exit is likely located at (0,0) or (2,0),
