      \ Position**: I am currently at coordinates (1, 1).\n2.  **North (1, 0)**: A\
      \ wall blocks movement.\n3.  **East (1, 2)**: A wall blocks movement.\n4.  **South\
      \ (1, 2)**: A wall blocks movement.\n5.  **West (1, 0)**: There is a corridor.\
      \ It extends one meter (1 unit) to the West to (0, 0). The corridor also has\
      \ lateral paths.\n    *   One meter North from the end of the West corridor\
      \ (at 0, 0) is a lateral path.\n    *   This implies there is a wall at (0,\
      \ 1) blocking a straight path North-South, allowing a path North from (0, 0)\
      \ or South from (0, 0) to exist (or perhaps a turn).\n    *   Crucially, since\
      \ I am at (1, 1) and the West corridor goes to (0, 0), and (0, 0) has a path\
      \ North, I need to reach (0, 0) to explore that path. I cannot reach it by going\
      \ straight West from (1, 1) because (0, 1) is a wall.\n\nLet's update the map\
      \ to reflect walls and the corridor.\n\n```text\n   0 1 2\n0  W ? ?\n1  ? ?\
      \ #\n2  ? ? #\n```\n\n*   `#` marks walls I cannot cross.\n*   `W` marks the\
      \ start of the West corridor at (1, 0).\n*   `?` marks areas I cannot reach\
      \ or determine yet (North of the West corridor or the dead ends).\n\n**Goal**:\
      \ Find the exit. The exit is on the border.\n*   If I go West to (0, 0), I can\
      \ go North (Exit) or South (Wall).\n*   Is there any other exit? The East, South,\
