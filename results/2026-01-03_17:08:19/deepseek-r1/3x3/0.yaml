      \ as your starting position.\nYour goal is to find the maze exit. Once you reach\
      \ it you must step out of the maze with one last move.\n\nThe maze is a 3 x\
      \ 3 grid, with every square in the grid being one square meter big.\n\nYou may\
      \ reason freely and in detail about what your next move should be.\nExploration\
      \ and careful thinking are encouraged.\n\nHowever, you MUST always conclude\
      \ your answer with a final move.\n\n### Output format (mandatory)\n\nFirst,\
      \ write your reasoning in plain text.\nThen, on a new line, write exactly one\
      \ line in the following format:\n\nFINAL MOVE: <N|E|S|W>\n\nNothing is allowed\
      \ after that line.\n\n### Rules\n\n- You must choose exactly one of: N, E, S,\
      \ W.\n- Do NOT output code, simulations, or examples.\n- Do NOT explain the\
      \ rules of the game.\n- Failure to provide a final move in the specified format\
      \ means failure of the task.\n\nExample:\n\nReasoning:\nI want to explore the\
      \ unknown corridor to gather more information.\n\nFINAL MOVE: N\nDue North there\
      \ is a wall. You can't step in that direction.\nDue East there is a wall. You\
      \ can't step in that direction.\nDue South there is a corridor that goes on\
      \ for two meters before encountering a wall. Although the corridor ends with\
      \ a wall, you notice that some of the lateral paths along the way are open so\
