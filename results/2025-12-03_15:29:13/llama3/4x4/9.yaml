chat_history:
  system_prompt: You are a helpful assistant.
  chat:
  - prompt: "\nYou are inside a maze. You have a compass with you. The maze is well\
      \ lit so you can see in all directions how long the corridors are.\nJust like\
      \ a classic maze the exit is on the border. You could be anywhere in the maze\
      \ as your starting position.\nYour goal is to find the maze exit. Once you reach\
      \ it you must step out of the maze with one last move.\n\nTell me which direction\
      \ you would like to go to. Provide your answer in the form of the initial of\
      \ the cardinal direction you wish to take a step forwards to.\nThe possible\
      \ directions are N for north, E for east, S for south, W for west.\n\n\nYou\
      \ are advised to think out loud about what your next move should be, but remember\
      \ that the last thing you write must be a valid direction.\n\nAs an example\
      \ if you want to step towards north the last character in your answer would\
      \ be: N\n\nYou get as many turns as you want, so it's normal that at the start\
      \ you have not enough information to know on what cell the exit is, so consider\
      \ exploring to gather information at the start.\n\nThe maze is a 4 x 4 grid,\
      \ with every square in the grid being one square meter big.\nDue North there\
      \ is a wall. You can't step in that direction.\nDue East you can see a natural\
      \ light shining in that direction, it is probably the direction of the exit!\n\
      Due South there is a corridor that goes on for one meter before encountering\
      \ a wall. Although the corridor ends with a wall, you notice that some of the\
      \ lateral paths along the way are open so it isn't a dead end.\nDue West there\
      \ is a wall. You can't step in that direction.\n\nThe moves you have made till\
      \ now are: \nYour possible moves are: E, S.\nAfter thinking it through, provide\
      \ your next move."
    response: 'Let me think about this... Since I know the exit is likely to be in
      the east direction due to the natural light shining there, I don''t want to
      waste any more turns than necessary. Additionally, the south corridor doesn''t
      seem too promising since it ends with a wall.


      I''m going to choose to move towards the South direction (S) for now and see
      how long the corridor is before deciding what to do next. Maybe I''ll get some
      more information about the lateral paths or find something that will help me
      make a better decision later on.


      My answer is: S'
