      \nThis is a 32-bit floating point number, but the exponent and sign of this\
      \ number are so large that the actual value is almost exactly equal to zero.\
      \ The next floating point number (just slightly more than this one) would be\
      \ 1.0! If we were dealing with integers instead of floats, you could think of\
      \ these numbers as being just outside the range -2^31 to 2^31-1 on a 32-bit\
      \ machine.\nIn other words, in C++, when you do:\nint i = 2147483648;\n\nYou're\
      \ actually storing that as a float (which is typically 4 bytes)! Then if you\
      \ use it like so:\nfloat f = i;\n\nThen what happens is the compiler converts\
      \ this integer into a floating point number by pretending it's an infinitely\
      \ large negative number, which is why all of its bits are set. It then tries\
      \ to store these bits in the memory reserved for float (which is typically 4\
      \ bytes), and so some of these high-order bits overflow into the exponent field\
      \ of this float, making it look like a very tiny positive number.\nIn other\
      \ words:\nint i = 2147483648; // Really -2^31 (as an int!)\nfloat f = i;\n//\
      \ What's really happening is that the compiler converts this into a float pretending\
      \ it's a very large negative number like so:\nfloat f = 0x80000000;  // All\
      \ bits set to 1, interpreted as a negative floating point number!\n        \
      \                // This then gets stored in memory for the float f.\n\nSo when\
      \ you do printf(\"%f\", f);, what happens is that it prints out this \"infinitely\
      \ large positive\" float value which corresponds to a tiny fraction of 1.0 (because\
      \ the exponent field is so huge). This explains why all of its bits are set!\n\
      In other words:\nprintf(\"%f\", f);  // Really printf(\"%f\", 0x80000000);\n\
      // So it prints out \"2147483648.000000\" because the value you're really printing\
      \ is 0x80000000 interpreted as a float:\n                  // 0x80000000 = +/-\
      \ infinity!\n\nYou can verify this yourself by compiling your program with -g\
      \ and then running it in gdb (for example), or just examining the memory at\
      \ address f. In both cases you'll see that the high-order bits of this float\
      \ are indeed all set to 1s:\n(gdb) p *f\n$6 = {float = 2147483648}\n(gdb) x/5b\
      \ &f\n0xffffc900 <...f+128>:    0xff        ?         ?         ?          0\
      \       \n0xffffc908 <...f+136>:    0xff        ?         ?         ?      \
      \    0       \n0xffffc910 <...f+144>:    0xff        ?         ?         ? \
      \         0       \n0xffffc918 <...f+152>:    0xff                   + 30 bits\
      \ more of one's\n(gdb) p *(int*)f\n$7 = {int = -2147483648}\n\nNote that in\
      \ this case, the way you're printing out f is actually changing its value! When\
      \ you print it as a float like so:\nprintf(\"%f\", f);  // 0x80000000 = +/-\
      \ infinity\n\nIt ends up causing this to be converted into an actual infinite\
      \ value (all ones in the exponent field) when stored back in memory. But if\
      \ you're just examining it without printing it like so:\nint i = *(int*)f;\n\
      printf(\"%d\", i);  // Prints -2147483648 as expected!\n\nThen its value is\
      \ not changed and thus the memory at address f still contains 0x80000000 when\
      \ you're examining it.\nHope that helps explain what's going on!\nAs a side\
      \ note, this kind of overflow bug actually makes a lot more sense in C++ than\
      \ Java since Java is strictly type-safe (and the code you posted does not compile\
      \ in Java). So in C++, this kind of subtle optimization mistake by the compiler\
      \ can cause a whole host of weird bugs and is one reason why it's so important\
      \ to be careful with types!\n\nA: There was an overflow when casting int to\
      \ float. When you cast 2147483648 (or -2147483648) into a float, the value becomes\
      \ 0x80000000 which is interpreted as \"infinity\" in floating point representation.\n\
      \nA: What happens here is that you're trying to cast an integer of size INT_MAX\
      \ (2147483647) into a float, and because this number can not be represented\
      \ with 32 bits using the float type, the compiler will use the largest value\
      \ it can express instead. So you get back the negated max int in your float\
      \ variable.\n\nA: It's a result of a loss-of-precision problem when converting\
      \ an integer to a floating point number - and not overflow at all (as others\
      \ have suggested).\nThe highest possible integral type value is 2147483648,\
      \ which will translate to float as 0x80000000 (assuming you're on a platform\
      \ that uses the IEEE-754 single precision floating point representation for\
      \ floats).\nIf you print out this number in binary format, it is:\n1000 0000\
      \ 0000 0000 0000 0000 0000 0000 (32 bits)\nIn IEEE-754 representation, the first\
      \ bit is a sign bit; it indicates whether the number is positive or negative.\
      \ The next 8 bits are the exponent field and the remaining 23 bits make up the\
      \ fraction field.\nThe \"1\" that appears at the start of this binary value\
      \ represents a \"special\" condition: +Infinity in floating point representation,\
      \ which is used to indicate an overflow situation (or when you're doing some\
      \ arithmetic operations where even the smallest possible float number isn't\
      \ enough).\nAs for your last question - the bits are set because it's just how\
      \ the sign bit of a float looks like if a very large integer value is being\
      \ converted into one.\n\nA: It's all about the representation of numbers in\
      \ a computer.\nWhen you try to cast int variable 2147483648 to float, compiler\
      \ first converts it to binary floating point number (you can print it by using\
      \ format specifier \"%f\") and then stores this number into a float variable.\n\
      To store these numbers in 32 bits, two's complement is used which means if we\
      \ try to represent a positive value we get its binary equivalent directly. But\
      \ when the compiler tries to convert -2147483648 (i.e. INT_MAX) to float, it\
      \ ends up using all ones in exponent field and gives us \"infinity\" as an output\
      \ which is stored in memory for this float variable.\n"
