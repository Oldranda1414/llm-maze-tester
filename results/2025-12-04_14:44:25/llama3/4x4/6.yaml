chat_history:
  system_prompt: You are a helpful assistant.
  chat:
  - prompt: "\nYou are inside a maze. You have a compass with you. The maze is well\
      \ lit so you can see in all directions how long the corridors are.\nJust like\
      \ a classic maze the exit is on the border. You could be anywhere in the maze\
      \ as your starting position.\nYour goal is to find the maze exit. Once you reach\
      \ it you must step out of the maze with one last move.\n\nTell me which direction\
      \ you would like to go to. Provide your answer in the form of the initial of\
      \ the cardinal direction you wish to take a step forwards to.\nThe possible\
      \ directions are N for north, E for east, S for south, W for west.\n\n\nYou\
      \ are advised to think out loud about what your next move should be, but remember\
      \ that the last thing you write must be a valid direction.\n\nAs an example\
      \ if you want to step towards north the last character in your answer would\
      \ be: N\n\nYou get as many turns as you want, so it's normal that at the start\
      \ you have not enough information to know on what cell the exit is, so consider\
      \ exploring to gather information at the start.\n\nThe maze is a 4 x 4 grid,\
      \ with every square in the grid being one square meter big.\nDue North there\
      \ is a corridor that goes on for two meters before encountering a wall. Although\
      \ the corridor ends with a wall, you notice that some of the lateral paths along\
      \ the way are open so it isn't a dead end.\nDue East there is a wall. You can't\
      \ step in that direction.\nDue South there is a corridor that goes on for one\
      \ meter before encountering a wall. Although the corridor ends with a wall,\
      \ you notice that some of the lateral paths along the way are open so it isn't\
      \ a dead end.\nDue West there is a wall. You can't step in that direction.\n\
      \nThe moves you have made till now are: \nYour possible moves are: N, S.\nAfter\
      \ thinking it through, provide your next move."
    response: 'Let me think out loud for a moment...


      Since I don''t know where the exit is yet, I''ll try to gather more information
      by exploring some of the lateral paths. Since the corridor due North goes on
      for two meters before encountering a wall, and some of the lateral paths along
      the way are open, I think it''s worth investigating that direction further.


      I''ll take a step towards... N'
  - prompt: '

      You are inside a maze. You have a compass with you. The maze is well lit so
      you can see in all directions how long the corridors are.

      Just like a classic maze the exit is on the border. You could be anywhere in
      the maze as your starting position.

      Your goal is to find the maze exit. Once you reach it you must step out of the
      maze with one last move.


      Tell me which direction you would like to go to. Provide your answer in the
      form of the initial of the cardinal direction you wish to take a step forwards
      to.

      The possible directions are N for north, E for east, S for south, W for west.



      You are advised to think out loud about what your next move should be, but remember
      that the last thing you write must be a valid direction.


      As an example if you want to step towards north the last character in your answer
      would be: N


      You get as many turns as you want, so it''s normal that at the start you have
      not enough information to know on what cell the exit is, so consider exploring
      to gather information at the start.


      The maze is a 4 x 4 grid, with every square in the grid being one square meter
      big.

      Due North there is a corridor that goes on for one meter before encountering
      a wall. Although the corridor ends with a wall, you notice that some of the
      lateral paths along the way are open so it isn''t a dead end.

      Due East there is a wall. You can''t step in that direction.

      Due South there is a corridor that goes on for two meters before encountering
      a wall. Although the corridor ends with a wall, you notice that some of the
      lateral paths along the way are open so it isn''t a dead end.

      Due West there is a wall. You can''t step in that direction.


      The moves you have made till now are: North

      Your possible moves are: N, S.

      After thinking it through, provide your next move.'
