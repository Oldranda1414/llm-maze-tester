      lateral paths along the way are open so it isn''t a dead end.

      Due West there is a corridor that goes on for two meters before encountering
      a wall. It is a dead end.


      The moves you have made till now are: East

      Your possible moves are: S, W.

      After thinking it through, provide your next move.'
