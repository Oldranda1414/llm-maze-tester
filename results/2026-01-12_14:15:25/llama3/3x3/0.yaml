      lateral paths along the way are open so it isn''t a dead end.

      Due West there is a wall. You can''t step in that direction.'
    response: 'Let''s think this through. With no options to the north, east, or west,
      our next move will have to be south.


      I''ll take a step into the corridor that goes two meters before hitting a wall.
      I''m hoping that one of the lateral paths along the way might lead me further.


      My next move will be... South!'
