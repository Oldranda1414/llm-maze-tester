      a wall as mentioned previously, but there''s an open lateral path alongside
      it.


      Based on this information:

      - Going straight north hits a dead-end after 1m.

      - There are possible paths to our left (west) or right from here along with
      that northern route we have yet to explore further southwards since there was
      no new wall reported in the southern direction, but going west is blocked too.


      Since we''ve already explored North twice and encountered walls on all sides
      except for an open lateral path straight ahead which hasn''t been mentioned
      as a dead-end just after moving north again; it seems like taking another step
      due South from our starting position might lead us to unexplored paths:


