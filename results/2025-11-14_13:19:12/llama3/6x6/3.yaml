      a wall. Althogh the corridor ends with a wall, you notice that some of the lateral
      paths along the way are open so it isn''t a dead end.

      Due South there is a corridor that goes on for two meters before encountering
      a wall. Althogh the corridor ends with a wall, you notice that some of the lateral
      paths along the way are open so it isn''t a dead end.

      Due West there is a wall. You can''t step in that direction.


      The moves you have made till now are: North

      Your possible moves are: S, E.

      After thinking it through, provide your next move.'
