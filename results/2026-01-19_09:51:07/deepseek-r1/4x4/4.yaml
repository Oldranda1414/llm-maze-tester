      I am in a position where the North direction leads to a corridor that extends
      one meter and ends against a wall, with no side branches. East and South are
      blocked by walls, so I cannot move there. West has a corridor that extends one
      meter with lateral paths, including one due South after one meter.


      Since East and South are walls, I must focus on North or West. North leads to
      a dead end, so moving there would not be productive. West has a corridor with
      lateral paths, which might be more promising for finding the exit.


      I need to track my position. I''ll assume a grid system starting from (0,0)
