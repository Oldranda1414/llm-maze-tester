      \ stretches further than you can see, so you are unable to predict what lies\
      \ ahead.\nDue West there is a corridor that goes on for one meter before encountering\
      \ a wall. You are able to see that the corridor has some lateral paths:\n  \
      \ - After one meter there is a lateral path due South."
    response: I am at position (0,0). The maze is a 4x4 grid. Walls are impassable,
      so I cannot move north or east. South leads to an unknown corridor, and west
      has a corridor with a lateral path to the south after one meter. I must move
      west to explore the corridor with lateral paths. This might lead to new areas
      or the exit. Let's go West.
