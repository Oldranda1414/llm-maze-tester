      current cell has walls in North, South, and West, and an East corridor that
      extends one meter with a lateral path due North after one meter. Since I can't
      go North, South, or West from here, the only possible move is East. Moving East
      will take me to the next cell, and I'll update my map accordingly. The lateral
      path due North in the East corridor suggests there might be a branch, but since
      I'm moving away from it now, I'll revisit that later if needed. Let's go East.
