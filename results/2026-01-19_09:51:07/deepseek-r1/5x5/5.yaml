      the positions accordingly.


      The goal is to find the exit, which is on the border. I should explore paths
      that lead closer to the border or have lateral paths that might connect to the
      exit.


      Considering the current perceptions:

      - Moving north leads to a dead end (corridor ends without lateral paths).

      - Moving west might be promising because it has a lateral path due north, which
