      \u05DB\u05D5\u05DC\u05D5\u05EA.\n\n\u05D4\u05D1\u05D9\u05D8\u05D5\u05D9 \"can\"\
      \ \u05DE\u05E9\u05DE\u05E9 \u05D2\u05DD \u05DC\u05D4\u0440\u0430\u0437\u05D4\
      \ (\u05D4\u05D0\u05DD \u05D0\u05E0\u05D9 \u05D9\u05DB\u05D5\u05DC) \u05D5\u05D2\
      \u05DD \u05DC ([[permissibility]]). \u05D1\u05DE\u05E9\u05D4\u05D5 \u05DB\u05DE\
      \u05D5 \"you can go north\" \u05D6\u05D4 \u05D9\u05DB\u05D5\u05DC\u05EA \u05DE\
      \u05D5\u05DE\u05DC\u05E6\u05EA \u05D0\u05D5 \u0440\u0430\u0437\u0440\u0435\u0448\
      \u0435\u043D\u0430. \u05DC\u05E2\u05D5\u05DE\u05EA \u05D6\u05D0\u05EA, \u05D1\
      \u05DE\u05E9\u05D4\u05D5 \u05DB\u05DE\u05D5 \"you cannot go north\" \u05D6\u05D4\
      \ \u05D7\u05DC\u05E3 \u05E9\u05DC \u05D4 ([[prohibition]]). \u05D1\u05EA\u05E8\
      \u05D2\u05D9\u05DC \u05D4\u05D6\u05D4, \u05D4\u05E4\u05E2\u05D5\u05DC\u05D4\
      \ \"can\" \u05DE\u05E9\u05DE\u05E9\u05EA \u05DB [[prohibition]] (\"you can't\
      \ go north\") \u05DB\u05D0\u05E9\u05E8 \u05D6\u05D4 \u05DE\u05EA\u05D5\u05E8\
      \u05D2\u05DD \u05DC\"\u05D0\u05D9\u05DF \u05DC\u05DA \u05DE\u05D5\u05E9\u05D2\
      \ \u05D0\u05D9\u05E4\u05D4 \u05D0\u05EA\u05D4 \u05D4\u05D5\u05DC\u05DA\" (\u05D0\
      \u05D9\u05DF \u05DC\u05DA \u05DE\u05D5\u05E9\u05D2 \u05D0\u05D9\u05E4\u05D4\
      \ \u05D0\u05EA\u05D4 \u05D4\u05D5\u05DC\u05DA) - \u05D4 ([[metonymy]]]) \u05E9\
      \u05DC \u05D4 ([[prohibition]]).\n\n\u05D4\u05EA\u05E8\u05D2\u05D9\u05DC \u05DE\
      \u05EA\u05DE\u05E7\u05D3 \u05D2\u05DD \u05D1 ([[conditional sentences]]), \u05D1\
      \u05DE\u05D9\u05D5\u05D7\u05D3 \u05D1 ([[zero conditional]]), \u05E9\u05D1\u05D4\
      \ \u05D4 ([[condition]]) (\u05D4 ([[action]]) \u05E9\u05DC \u05D4\u05D5\u05DC\
      \u05DA \u05E6\u05E4\u05D5\u05E0\u05D4) \u05D2\u05D5\u05E8\u05E1\u05EA \u05D0\
      \u05EA \u05D4 ([[consequence]]) (\u05D4 ([[result]]) \u05E9\u05DC \u05D4 ([[action]])).\
      \ \u05D4 ([[zero conditional]]) \u05DE\u05E9\u05DE\u05E9 \u05D2\u05DD \u05D1\
      \ ([[hypothetical situations]]]), \u05D0\u05D1\u05DC \u05D1\u05EA\u05E8\u05D2\
