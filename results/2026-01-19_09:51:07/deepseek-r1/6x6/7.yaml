      \ on for one meter before encountering a wall. You are able to see that the\
      \ corridor has some lateral paths:\n   - After one meter there is a lateral\
      \ path due West.\nDue West there is a corridor that goes on for two meters before\
      \ encountering a wall. You are able to see that the corridor has some lateral\
      \ paths:\n   - After two meters there is a lateral path due North."
